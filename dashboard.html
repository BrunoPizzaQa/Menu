<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Bruno — Orders Dashboard</title>
  <link rel="icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="products-data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F2EC;
      --green: #3D5A38;
      --green-muted: rgba(61,90,56,0.5);
      --green-faint: rgba(61,90,56,0.08);
      --amber: #b9821f;
      --red: #c0392b;
    }
    html { font-size: 16px; }
    body {
      background: var(--cream);
      color: var(--green);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 36px 28px 30px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 16px 50px rgba(61,90,56,0.14);
      text-align: center;
    }
    .login-card img { width: 88px; height: 88px; object-fit: contain; margin-bottom: 10px; }
    .login-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .login-card p { font-size: 12px; color: var(--green-muted); margin-bottom: 22px; letter-spacing: 0.02em; }
    .login-card input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid rgba(61,90,56,0.3);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--green);
      margin-bottom: 10px;
      outline: none;
    }
    .login-card input:focus { border-color: var(--green); }
    .login-card button {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-card button:disabled { opacity: 0.7; cursor: default; }
    .login-err { color: var(--red); font-size: 12px; min-height: 16px; margin-top: 10px; }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      box-shadow: 0 2px 12px rgba(61,90,56,0.25);
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left img { width: 34px; height: 34px; object-fit: contain; background:#fff; border-radius:50%; padding:3px; }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .sound-toggle, .logout-btn, .clear-btn {
      background: rgba(255,255,255,0.16);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .sound-toggle.off { opacity: 0.55; }
    .clear-btn { background: rgba(192,57,43,0.85); }
    .clear-btn:disabled { opacity: 0.6; cursor: default; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 16px 0;
      max-width: 760px;
      margin: 0 auto;
    }
    .tab {
      flex: 1;
      padding: 10px;
      background: #fff;
      border: 1.5px solid rgba(61,90,56,0.15);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--green-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }
    .tab.active { background: var(--green); color: #fff; border-color: var(--green); }
    .tab .badge {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      min-width: 18px;
      height: 18px;
      line-height: 18px;
      border-radius: 9px;
      padding: 0 5px;
      margin-left: 5px;
    }
    .tab.active .badge { background: #fff; color: var(--green); }

    /* ── ORDERS ── */
    .orders {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .empty {
      text-align: center;
      color: var(--green-muted);
      font-size: 14px;
      padding: 60px 20px;
    }
    .order {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(61,90,56,0.07);
      border-left: 5px solid rgba(61,90,56,0.2);
    }
    .order.new { border-left-color: var(--red); animation: pop 0.4s ease; }
    .order.received { border-left-color: var(--amber); }
    .order.done { border-left-color: var(--green); opacity: 0.85; }
    @keyframes pop { 0% { transform: scale(0.97); } 60% { transform: scale(1.01); } 100% { transform: scale(1); } }
    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .order-plate {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--green);
      line-height: 1.3;
    }
    .order-country { font-size: 12px; color: var(--green-muted); margin-top: 2px; }
    .order-phone { font-size: 13px; margin-top: 5px; }
    .order-phone a { color: var(--green); text-decoration: none; font-weight: 600; }
    .order-phone a:hover { text-decoration: underline; }
    .order-meta { text-align: right; flex-shrink: 0; }
    .order-time { font-size: 11px; color: var(--green-muted); white-space: nowrap; line-height: 1.5; }
    .status-pill {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .status-pill.new { background: rgba(192,57,43,0.12); color: var(--red); }
    .status-pill.received { background: rgba(185,130,31,0.14); color: var(--amber); }
    .status-pill.done { background: var(--green-faint); color: var(--green); }
    .order-items { border-top: 1px solid var(--green-faint); padding-top: 10px; margin-bottom: 12px; }
    .order-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--green);
      padding: 3px 0;
    }
    .order-item .q { font-weight: 600; }
    .order-item-note { display: block; font-size: 12px; font-style: italic; color: var(--green-muted); margin-top: 2px; }
    .order-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid var(--green-faint);
      padding-top: 10px;
      font-family: 'Playfair Display', serif;
    }
    .order-total .lbl { font-size: 13px; color: var(--green-muted); }
    .order-total .val { font-size: 18px; font-weight: 600; color: var(--green); }
    .order-actions { display: flex; gap: 8px; margin-top: 14px; }
    .act-btn {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .act-received { background: var(--amber); color: #fff; }
    .act-done { background: var(--green); color: #fff; }
    .act-reopen { background: #fff; color: var(--green); border: 1.5px solid rgba(61,90,56,0.3); }
    .act-cancel { background: #fff; color: var(--red); border: 1.5px solid rgba(192,57,43,0.4); }
    .act-restore { background: #fff; color: var(--green); border: 1.5px solid rgba(61,90,56,0.3); }
    .act-btn:active { transform: scale(0.98); }

    .order.cancelled { border-left-color: var(--red); opacity: 0.6; }
    .status-pill.cancelled { background: rgba(192,57,43,0.12); color: var(--red); }
    .order-timing {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 16px;
      border-top: 1px solid var(--green-faint);
      padding-top: 10px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--green-muted);
    }
    .order-timing b { color: var(--green); font-weight: 600; }

    .config-warn {
      max-width: 760px;
      margin: 16px auto;
      background: #fdf0ee;
      color: var(--red);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
    }
    /* ── PRODUCTS MANAGEMENT ── */
    .products-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 16px 80px;
    }
    .products-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .pbtn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .pbtn-primary { background: var(--green); color: #fff; }
    .pbtn-ghost { background: #fff; color: var(--green); border: 1.5px solid rgba(61,90,56,0.3); }
    .pbtn-danger { background: #fff; color: var(--red); border: 1.5px solid rgba(192,57,43,0.4); }
    .pbtn:active { transform: scale(0.98); }
    .pbtn:disabled { opacity: 0.6; cursor: default; }

    .pcat-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--green);
      margin: 18px 0 8px;
    }
    .prow {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 4px 16px rgba(61,90,56,0.07);
      margin-bottom: 10px;
    }
    .prow.soldout { opacity: 0.65; }
    .prow-img {
      width: 52px; height: 52px;
      border-radius: 9px;
      object-fit: cover;
      background: var(--green-faint);
      flex-shrink: 0;
    }
    .prow-info { flex: 1; min-width: 0; }
    .prow-name { font-size: 14px; font-weight: 600; color: var(--green); }
    .prow-meta { font-size: 12px; color: var(--green-muted); margin-top: 2px; }
    .prow-soldout-tag {
      display: inline-block;
      background: rgba(192,57,43,0.12);
      color: var(--red);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: 6px;
    }
    .prow-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .iconbtn {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: var(--green-faint);
      color: var(--green);
    }
    .iconbtn.warn { background: rgba(185,130,31,0.16); color: var(--amber); }
    .iconbtn.danger { background: rgba(192,57,43,0.1); color: var(--red); }
    .iconbtn:active { transform: scale(0.95); }

    /* product form */
    .pform {
      background: #fff;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 4px 16px rgba(61,90,56,0.08);
      margin-bottom: 16px;
    }
    .pform h3 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .pfield { margin-bottom: 12px; }
    .pfield label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--green-muted);
      margin-bottom: 5px;
    }
    .pfield input[type="text"],
    .pfield input[type="number"],
    .pfield input[type="url"],
    .pfield textarea,
    .pfield select {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid rgba(61,90,56,0.3);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--green);
      outline: none;
      background: #fff;
    }
    .pfield input:focus, .pfield textarea:focus, .pfield select:focus { border-color: var(--green); }
    .pfield textarea { resize: vertical; min-height: 56px; }
    .pfield-row { display: flex; gap: 10px; }
    .pfield-row .pfield { flex: 1; }
    .pform-preview {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 10px;
      background: var(--green-faint);
      margin-top: 8px;
      display: none;
    }
    .pcheck { display: flex; align-items: center; gap: 8px; }
    .pcheck input { width: 18px; height: 18px; }
    .pcheck label { margin: 0; font-size: 13px; color: var(--green); font-weight: 500; }
    .pform-actions { display: flex; gap: 8px; margin-top: 6px; }
    .pform-actions .pbtn { flex: 1; }
    .pform-err { color: var(--red); font-size: 12px; min-height: 16px; margin-top: 8px; }
    .pupload-hint { font-size: 11px; color: var(--green-muted); margin-top: 5px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <img src="bruno-logo.png" alt="Bruno" />
      <h1>Bruno Orders</h1>
      <p>Staff Login · دخول الموظفين</p>
      <input type="email" id="email" placeholder="Email · البريد" autocomplete="username" />
      <input type="password" id="password" placeholder="Password · كلمة المرور" autocomplete="current-password" />
      <button id="loginBtn">Sign In · تسجيل الدخول</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hidden">
    <div class="topbar">
      <div class="topbar-left">
        <img src="bruno-logo.png" alt="Bruno" />
        <span class="topbar-title">Orders · الطلبات</span>
      </div>
      <div class="topbar-actions">
        <button class="sound-toggle" id="soundToggle" title="New order sound">🔔 On</button>
        <button class="clear-btn" id="clearBtn" title="Delete all orders">🗑 حذف الكل</button>
        <button class="logout-btn" id="logoutBtn">Logout · خروج</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="active" id="tabActive">Active · النشطة <span class="badge hidden" id="activeBadge">0</span></div>
      <div class="tab" data-tab="received" id="tabReceived">Received · المستلمة <span class="badge hidden" id="receivedBadge">0</span></div>
      <div class="tab" data-tab="done" id="tabDone">Completed · المكتملة <span class="badge hidden" id="doneBadge">0</span></div>
      <div class="tab" data-tab="cancelled" id="tabCancelled">Cancelled · ملغي <span class="badge hidden" id="cancelledBadge">0</span></div>
      <div class="tab" data-tab="products" id="tabProducts">Products · المنتجات</div>
    </div>

    <div class="orders" id="orders"></div>

    <div class="products-wrap hidden" id="productsView">
      <div class="products-toolbar">
        <button class="pbtn pbtn-primary" id="addProductBtn">＋ Add product · إضافة منتج</button>
        <button class="pbtn pbtn-ghost" id="seedBtn">⬇ Import current menu · استيراد المنيو الحالي</button>
      </div>

      <!-- add / edit form -->
      <div class="pform hidden" id="productForm">
        <h3 id="pformTitle">Add product · إضافة منتج</h3>
        <input type="hidden" id="pfId" />
        <div class="pfield">
          <label for="pfName">Name · الاسم</label>
          <input type="text" id="pfName" placeholder="e.g. Margherita · مارغريتا" />
        </div>
        <div class="pfield-row">
          <div class="pfield">
            <label for="pfPrice">Price (QAR) · السعر</label>
            <input type="number" id="pfPrice" inputmode="decimal" min="0" step="1" placeholder="54" />
          </div>
          <div class="pfield">
            <label for="pfCategory">Category · التصنيف</label>
            <select id="pfCategory"></select>
          </div>
        </div>
        <div class="pfield hidden" id="newCatWrap">
          <label for="pfNewCatTitle">New category name · اسم التصنيف الجديد</label>
          <input type="text" id="pfNewCatTitle" placeholder="e.g. Desserts · الحلويات" />
          <label for="pfNewCatDisplay" style="margin-top:8px;">Display style · طريقة العرض</label>
          <select id="pfNewCatDisplay">
            <option value="card">With photos (cards) · بطاقات بصور</option>
            <option value="list">Compact list · قائمة مبسطة</option>
          </select>
        </div>
        <div class="pfield">
          <label for="pfDesc">Description · الوصف</label>
          <textarea id="pfDesc" placeholder="Fresh mozzarella · tomato sauce"></textarea>
        </div>
        <div class="pfield">
          <label for="pfImageFile">Image · الصورة</label>
          <input type="file" id="pfImageFile" accept="image/*" />
          <div class="pupload-hint">Upload a photo from your phone, or paste an image link below · ارفع صورة من جوالك أو الصق رابط صورة بالأسفل</div>
          <input type="url" id="pfImageUrl" placeholder="https://… (optional · اختياري)" style="margin-top:8px;" />
          <img class="pform-preview" id="pfPreview" alt="" />
        </div>
        <div class="pfield pcheck">
          <input type="checkbox" id="pfAvailable" checked />
          <label for="pfAvailable">Available · متوفر (uncheck = Sold Out · نفذت الكمية)</label>
        </div>
        <div class="pform-err" id="pformErr"></div>
        <div class="pform-actions">
          <button class="pbtn pbtn-primary" id="pfSave">Save · حفظ</button>
          <button class="pbtn pbtn-ghost" id="pfCancel">Cancel · إلغاء</button>
        </div>
      </div>

      <div id="productsList"></div>
    </div>
  </div>

  <script>
    (function () {
      var loginWrap = document.getElementById('loginWrap');
      var dash = document.getElementById('dash');
      var emailEl = document.getElementById('email');
      var passEl = document.getElementById('password');
      var loginBtn = document.getElementById('loginBtn');
      var loginErr = document.getElementById('loginErr');
      var logoutBtn = document.getElementById('logoutBtn');
      var ordersEl = document.getElementById('orders');
      var tabActive = document.getElementById('tabActive');
      var tabReceived = document.getElementById('tabReceived');
      var tabDone = document.getElementById('tabDone');
      var tabCancelled = document.getElementById('tabCancelled');
      var activeBadge = document.getElementById('activeBadge');
      var receivedBadge = document.getElementById('receivedBadge');
      var doneBadge = document.getElementById('doneBadge');
      var cancelledBadge = document.getElementById('cancelledBadge');
      var soundToggle = document.getElementById('soundToggle');
      var clearBtn = document.getElementById('clearBtn');

      var configured = window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey !== 'REPLACE_ME';
      if (!configured) {
        loginWrap.innerHTML = '<div class="config-warn">⚠️ Firebase is not configured yet. Add your Firebase web config to <b>firebase-config.js</b> to enable the dashboard.<br><br>لم يتم ضبط Firebase بعد. أضف إعدادات Firebase في ملف <b>firebase-config.js</b>.</div>';
        return;
      }

      firebase.initializeApp(window.FIREBASE_CONFIG);
      var auth = firebase.auth();
      var db = firebase.firestore();
      var COLL = window.ORDERS_COLLECTION || 'orders';

      var currentTab = 'active';
      var orders = [];
      var unsub = null;
      var soundOn = true;
      var knownNewIds = {};
      var firstLoad = true;

      /* ── new-order chime via WebAudio (no asset needed) ── */
      var audioCtx = null;
      function chime() {
        if (!soundOn) return;
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          var o = audioCtx.createOscillator();
          var g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(880, audioCtx.currentTime);
          o.frequency.setValueAtTime(1175, audioCtx.currentTime + 0.13);
          g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
          o.start();
          o.stop(audioCtx.currentTime + 0.42);
        } catch (e) { /* ignore */ }
      }

      soundToggle.addEventListener('click', function () {
        soundOn = !soundOn;
        soundToggle.textContent = soundOn ? '🔔 On' : '🔕 Off';
        soundToggle.classList.toggle('off', !soundOn);
        if (soundOn) { audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)(); }
      });

      /* ── delete ALL orders (clears the database) ── */
      clearBtn.addEventListener('click', function () {
        if (!orders.length) {
          alert('No orders to delete · لا توجد طلبات للحذف');
          return;
        }
        var ok = confirm('Delete ALL orders in the database permanently? This cannot be undone.\n\nحذف كل الطلبات في قاعدة البيانات نهائياً؟ لا يمكن التراجع.');
        if (!ok) return;
        clearBtn.disabled = true;
        var origLabel = clearBtn.textContent;
        clearBtn.textContent = '… جارٍ الحذف';

        db.collection(COLL).get().then(function (snap) {
          var docs = snap.docs;
          function deleteChunk(i) {
            if (i >= docs.length) return Promise.resolve();
            var batch = db.batch();
            docs.slice(i, i + 400).forEach(function (d) { batch.delete(d.ref); });
            return batch.commit().then(function () { return deleteChunk(i + 400); });
          }
          return deleteChunk(0);
        }).then(function () {
          knownNewIds = {};
          clearBtn.disabled = false;
          clearBtn.textContent = origLabel;
        }).catch(function (e) {
          clearBtn.disabled = false;
          clearBtn.textContent = origLabel;
          alert('Could not delete orders. · تعذّر حذف الطلبات.\n' + e.message);
        });
      });

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function fmtTime(ts) {
        if (!ts || !ts.toDate) return '';
        var d = ts.toDate();
        var h = d.getHours(), m = d.getMinutes();
        var ap = h >= 12 ? 'PM' : 'AM';
        h = h % 12; if (h === 0) h = 12;
        return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap;
      }

      function fmtDate(ts) {
        if (!ts || !ts.toDate) return '';
        var d = ts.toDate();
        var day = d.getDate(), mon = d.getMonth() + 1, yr = d.getFullYear();
        return (day < 10 ? '0' + day : day) + '/' + (mon < 10 ? '0' + mon : mon) + '/' + yr;
      }

      function statusLabel(s) {
        if (s === 'received') return 'Received · مستلم';
        if (s === 'done') return 'Done · مكتمل';
        if (s === 'cancelled') return 'Cancelled · ملغي';
        return 'New · جديد';
      }

      function prepMinutes(a, b) {
        if (!a || !a.toDate || !b || !b.toDate) return null;
        var ms = b.toDate().getTime() - a.toDate().getTime();
        if (ms < 0) return null;
        return Math.round(ms / 60000);
      }

      function render() {
        var list = orders.filter(function (o) {
          if (currentTab === 'received') return o.status === 'received';
          if (currentTab === 'done') return o.status === 'done';
          if (currentTab === 'cancelled') return o.status === 'cancelled';
          return o.status !== 'received' && o.status !== 'done' && o.status !== 'cancelled';
        });

        var activeCount = orders.filter(function (o) { return o.status !== 'received' && o.status !== 'done' && o.status !== 'cancelled'; }).length;
        if (activeCount > 0) { activeBadge.textContent = activeCount; activeBadge.classList.remove('hidden'); }
        else { activeBadge.classList.add('hidden'); }

        var receivedCount = orders.filter(function (o) { return o.status === 'received'; }).length;
        if (receivedCount > 0) { receivedBadge.textContent = receivedCount; receivedBadge.classList.remove('hidden'); }
        else { receivedBadge.classList.add('hidden'); }

        var doneCount = orders.filter(function (o) { return o.status === 'done'; }).length;
        if (doneCount > 0) { doneBadge.textContent = doneCount; doneBadge.classList.remove('hidden'); }
        else { doneBadge.classList.add('hidden'); }

        var cancelledCount = orders.filter(function (o) { return o.status === 'cancelled'; }).length;
        if (cancelledCount > 0) { cancelledBadge.textContent = cancelledCount; cancelledBadge.classList.remove('hidden'); }
        else { cancelledBadge.classList.add('hidden'); }

        if (!list.length) {
          var emptyMsg = 'No new orders · لا توجد طلبات جديدة';
          if (currentTab === 'received') emptyMsg = 'No received orders · لا توجد طلبات مستلمة';
          else if (currentTab === 'done') emptyMsg = 'No completed orders yet · لا توجد طلبات مكتملة';
          else if (currentTab === 'cancelled') emptyMsg = 'No cancelled orders · لا توجد طلبات ملغاة';
          ordersEl.innerHTML = '<div class="empty">' + emptyMsg + '</div>';
          return;
        }

        var html = '';
        list.forEach(function (o) {
          var itemsHtml = (o.items || []).map(function (it) {
            return '<div class="order-item"><span><span class="q">' + esc(it.qty) + '×</span> ' + esc(it.name) +
              (it.note ? '<span class="order-item-note">📝 ' + esc(it.note) + '</span>' : '') + '</span>' +
              '<span>' + esc((it.price || 0) * (it.qty || 0)) + ' QAR</span></div>';
          }).join('');

          var cancelBtn = '<button class="act-btn act-cancel" data-act="cancel" data-id="' + esc(o.id) + '">✕ Cancel · إلغاء</button>';
          var actions = '';
          if (o.status === 'received') {
            actions = '<button class="act-btn act-done" data-act="done" data-id="' + esc(o.id) + '">✓✓ Done · تم الانتهاء</button>' +
                      cancelBtn;
          } else if (o.status === 'done') {
            actions = '<button class="act-btn act-reopen" data-act="reopen" data-id="' + esc(o.id) + '">↩ Reopen · إعادة فتح</button>' +
                      cancelBtn;
          } else if (o.status === 'cancelled') {
            actions = '<button class="act-btn act-restore" data-act="restore" data-id="' + esc(o.id) + '">↩ Restore · استعادة</button>';
          } else {
            actions = '<button class="act-btn act-received" data-act="received" data-id="' + esc(o.id) + '">✓ Received · استلمت</button>' +
                      cancelBtn;
          }

          var timingParts = [];
          if (o.receivedAt) timingParts.push('<span>Received · استلام: <b>' + esc(fmtTime(o.receivedAt)) + '</b></span>');
          if (o.doneAt) timingParts.push('<span>Done · إنهاء: <b>' + esc(fmtTime(o.doneAt)) + '</b></span>');
          if (o.status === 'cancelled' && o.cancelledAt) timingParts.push('<span>Cancelled · إلغاء: <b>' + esc(fmtTime(o.cancelledAt)) + '</b></span>');
          var prep = prepMinutes(o.receivedAt, o.doneAt);
          if (prep !== null) timingParts.push('<span>Prep · التحضير: <b>' + esc(prep) + ' min</b></span>');
          var timingHtml = timingParts.length ? '<div class="order-timing">' + timingParts.join('') + '</div>' : '';

          var phoneHtml = '';
          if (o.phone) {
            var telHref = String(o.phone).replace(/[^\d+]/g, '');
            phoneHtml = '<div class="order-phone">📱 <a href="tel:' + esc(telHref) + '">' + esc(o.phone) + '</a></div>';
          }

          html += '<div class="order ' + esc(o.status) + '">' +
            '<div class="order-top">' +
              '<div><div class="order-plate">🚗 ' + esc(o.plate) + '</div>' +
              '<div class="order-country">' + esc(o.country) + '</div>' +
              phoneHtml + '</div>' +
              '<div class="order-meta"><div class="order-time">' + esc(fmtDate(o.createdAt)) + '<br>' + esc(fmtTime(o.createdAt)) + '</div>' +
              '<span class="status-pill ' + esc(o.status) + '">' + esc(statusLabel(o.status)) + '</span></div>' +
            '</div>' +
            '<div class="order-items">' + itemsHtml + '</div>' +
            timingHtml +
            '<div class="order-total"><span class="lbl">Total · المجموع</span><span class="val">' + esc(o.total) + ' QAR</span></div>' +
            '<div class="order-actions">' + actions + '</div>' +
          '</div>';
        });
        ordersEl.innerHTML = html;
      }

      ordersEl.addEventListener('click', function (e) {
        var b = e.target.closest('button');
        if (!b) return;
        var id = b.getAttribute('data-id');
        var act = b.getAttribute('data-act');
        if (!id || !act) return;
        if (act === 'cancel' && !confirm('Cancel this order? · إلغاء هذا الطلب؟')) return;

        var ts = firebase.firestore.FieldValue.serverTimestamp;
        var del = firebase.firestore.FieldValue.delete;
        var upd;
        if (act === 'received') upd = { status: 'received', receivedAt: ts() };
        else if (act === 'done') upd = { status: 'done', doneAt: ts() };
        else if (act === 'cancel') upd = { status: 'cancelled', cancelledAt: ts() };
        else if (act === 'reopen') upd = { status: 'received', doneAt: del() };
        else if (act === 'restore') upd = { status: 'new', receivedAt: del(), doneAt: del(), cancelledAt: del() };
        else upd = { status: act };

        b.disabled = true;
        db.collection(COLL).doc(id).update(upd).catch(function () {
          b.disabled = false;
          alert('Could not update. Check your connection. · تعذّر التحديث.');
        });
      });

      function selectTab(tab) {
        currentTab = tab;
        tabActive.classList.toggle('active', tab === 'active');
        tabReceived.classList.toggle('active', tab === 'received');
        tabDone.classList.toggle('active', tab === 'done');
        tabCancelled.classList.toggle('active', tab === 'cancelled');
        tabProducts.classList.toggle('active', tab === 'products');
        if (tab === 'products') {
          ordersEl.classList.add('hidden');
          productsView.classList.remove('hidden');
        } else {
          productsView.classList.add('hidden');
          ordersEl.classList.remove('hidden');
          render();
        }
      }
      tabActive.addEventListener('click', function () { selectTab('active'); });
      tabReceived.addEventListener('click', function () { selectTab('received'); });
      tabDone.addEventListener('click', function () { selectTab('done'); });
      tabCancelled.addEventListener('click', function () { selectTab('cancelled'); });

      function startListening() {
        if (unsub) return;
        unsub = db.collection(COLL).orderBy('createdAt', 'desc').limit(200)
          .onSnapshot(function (snap) {
            var newArrived = false;
            var next = [];
            snap.forEach(function (doc) {
              var d = doc.data();
              d.id = doc.id;
              next.push(d);
              if (d.status === 'new' && !knownNewIds[doc.id]) {
                knownNewIds[doc.id] = true;
                if (!firstLoad) newArrived = true;
              }
            });
            orders = next;
            firstLoad = false;
            render();
            if (newArrived) chime();
          }, function (err) {
            ordersEl.innerHTML = '<div class="config-warn">Could not load orders. Check Firestore rules / connection.<br>تعذّر تحميل الطلبات. تحقق من القواعد والاتصال.<br><br>' + esc(err.message) + '</div>';
          });
      }
      function stopListening() { if (unsub) { unsub(); unsub = null; } orders = []; knownNewIds = {}; firstLoad = true; }

      /* ── PRODUCTS MANAGEMENT ── */
      var PCOLL = window.PRODUCTS_COLLECTION || 'products';
      var CATS = window.PRODUCT_CATEGORIES || [];
      var storage = firebase.storage();

      var tabProducts = document.getElementById('tabProducts');
      tabProducts.addEventListener('click', function () { selectTab('products'); });
      var productsView = document.getElementById('productsView');
      var productsList = document.getElementById('productsList');
      var addProductBtn = document.getElementById('addProductBtn');
      var seedBtn = document.getElementById('seedBtn');
      var productForm = document.getElementById('productForm');
      var pformTitle = document.getElementById('pformTitle');
      var pfId = document.getElementById('pfId');
      var pfName = document.getElementById('pfName');
      var pfPrice = document.getElementById('pfPrice');
      var pfCategory = document.getElementById('pfCategory');
      var newCatWrap = document.getElementById('newCatWrap');
      var pfNewCatTitle = document.getElementById('pfNewCatTitle');
      var pfNewCatDisplay = document.getElementById('pfNewCatDisplay');
      var pfDesc = document.getElementById('pfDesc');
      var pfImageFile = document.getElementById('pfImageFile');
      var pfImageUrl = document.getElementById('pfImageUrl');
      var pfPreview = document.getElementById('pfPreview');
      var pfAvailable = document.getElementById('pfAvailable');
      var pformErr = document.getElementById('pformErr');
      var pfSave = document.getElementById('pfSave');
      var pfCancel = document.getElementById('pfCancel');

      var products = [];
      var unsubProducts = null;
      var pickedFile = null;

      function knownCat(key) {
        for (var i = 0; i < CATS.length; i++) { if (CATS[i].key === key) return CATS[i]; }
        return null;
      }
      // Resolve a category's display title + style: known categories first,
      // then any custom-category metadata stored on existing products.
      function categoryMeta(key) {
        var k = knownCat(key);
        if (k) return { key: key, title: k.title, display: k.display || 'card' };
        for (var i = 0; i < products.length; i++) {
          if ((products[i].category || '') === key && products[i].categoryTitle) {
            return { key: key, title: products[i].categoryTitle, display: products[i].categoryDisplay || 'card' };
          }
        }
        return { key: key, title: key || 'Other · أخرى', display: 'card' };
      }
      function catTitle(key) { return categoryMeta(key).title; }

      // Known categories first (defined order), then custom ones found on products.
      function allCategories() {
        var out = [], seen = {};
        CATS.forEach(function (c) { out.push({ key: c.key, title: c.title, display: c.display || 'card' }); seen[c.key] = true; });
        products.forEach(function (p) {
          var key = p.category || '';
          if (!key || seen[key]) return;
          seen[key] = true;
          out.push(categoryMeta(key));
        });
        return out;
      }

      function slugify(s) {
        var slug = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        return slug || ('cat-' + Date.now());
      }

      function populateCategorySelect(selected) {
        pfCategory.innerHTML = '';
        allCategories().forEach(function (c) {
          var opt = document.createElement('option');
          opt.value = c.key;
          opt.textContent = c.title;
          pfCategory.appendChild(opt);
        });
        var nu = document.createElement('option');
        nu.value = '__new__';
        nu.textContent = '➕ New category · تصنيف جديد';
        pfCategory.appendChild(nu);
        if (selected != null) pfCategory.value = selected;
        toggleNewCat();
      }

      function toggleNewCat() {
        if (pfCategory.value === '__new__') newCatWrap.classList.remove('hidden');
        else newCatWrap.classList.add('hidden');
      }
      pfCategory.addEventListener('change', toggleNewCat);

      function productRow(p) {
        var soldout = p.available === false;
        var img = p.imageUrl ? esc(p.imageUrl) : 'bruno-logo.png';
        return '<div class="prow ' + (soldout ? 'soldout' : '') + '">' +
          '<img class="prow-img" src="' + img + '" alt="" onerror="this.src=\'bruno-logo.png\'" />' +
          '<div class="prow-info">' +
            '<div class="prow-name">' + esc(p.name) + (soldout ? '<span class="prow-soldout-tag">Sold Out · نفذت</span>' : '') + '</div>' +
            '<div class="prow-meta">' + esc(String(Number(p.price) || 0)) + ' QAR · ' + esc(catTitle(p.category)) + '</div>' +
          '</div>' +
          '<div class="prow-actions">' +
            '<button class="iconbtn" data-pact="edit" data-id="' + esc(p.id) + '">✎ Edit · تعديل</button>' +
            '<button class="iconbtn warn" data-pact="toggle" data-id="' + esc(p.id) + '">' + (soldout ? '✓ Available · متوفر' : '⛔ Sold Out · سولد اوت') + '</button>' +
            '<button class="iconbtn danger" data-pact="delete" data-id="' + esc(p.id) + '">🗑</button>' +
          '</div>' +
        '</div>';
      }

      function renderProductsList() {
        if (!products.length) {
          productsList.innerHTML = '<div class="empty">No products in the database yet · لا توجد منتجات في قاعدة البيانات بعد.<br>Tap "Import current menu" to load your items. · اضغط "استيراد المنيو الحالي" لتحميل أصنافك.</div>';
          return;
        }
        var html = '';
        var shown = {};
        allCategories().forEach(function (cat) {
          var items = products.filter(function (p) { return (p.category || '') === cat.key; })
            .sort(function (a, b) { return (a.sortOrder || 0) - (b.sortOrder || 0); });
          if (!items.length) return;
          html += '<div class="pcat-title">' + esc(cat.title) + '</div>';
          items.forEach(function (p) { shown[p.id] = true; html += productRow(p); });
        });
        var others = products.filter(function (p) { return !shown[p.id]; });
        if (others.length) {
          html += '<div class="pcat-title">Other · أخرى</div>';
          others.forEach(function (p) { html += productRow(p); });
        }
        productsList.innerHTML = html;
      }

      function openForm(product) {
        pickedFile = null;
        pformErr.textContent = '';
        pfImageFile.value = '';
        pfNewCatTitle.value = '';
        pfNewCatDisplay.value = 'card';
        if (product) {
          pformTitle.textContent = 'Edit product · تعديل منتج';
          pfId.value = product.id;
          pfName.value = product.name || '';
          pfPrice.value = (product.price != null ? product.price : '');
          populateCategorySelect(product.category || (CATS[0] && CATS[0].key) || '');
          pfDesc.value = product.desc || '';
          pfImageUrl.value = product.imageUrl || '';
          pfAvailable.checked = product.available !== false;
          if (product.imageUrl) { pfPreview.src = product.imageUrl; pfPreview.style.display = 'block'; }
          else { pfPreview.style.display = 'none'; pfPreview.src = ''; }
        } else {
          pformTitle.textContent = 'Add product · إضافة منتج';
          pfId.value = '';
          pfName.value = '';
          pfPrice.value = '';
          populateCategorySelect((CATS[0] && CATS[0].key) || '');
          pfDesc.value = '';
          pfImageUrl.value = '';
          pfAvailable.checked = true;
          pfPreview.style.display = 'none';
          pfPreview.src = '';
        }
        productForm.classList.remove('hidden');
        productForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      function closeForm() { productForm.classList.add('hidden'); pickedFile = null; pfImageFile.value = ''; }

      // Add button toggles: open a blank form, or close it if already adding.
      addProductBtn.addEventListener('click', function () {
        if (!productForm.classList.contains('hidden') && !pfId.value) closeForm();
        else openForm(null);
      });
      pfCancel.addEventListener('click', closeForm);

      pfImageFile.addEventListener('change', function () {
        var f = pfImageFile.files && pfImageFile.files[0];
        pickedFile = f || null;
        if (f) {
          var reader = new FileReader();
          reader.onload = function (e) { pfPreview.src = e.target.result; pfPreview.style.display = 'block'; };
          reader.readAsDataURL(f);
        }
      });
      pfImageUrl.addEventListener('input', function () {
        if (!pickedFile && pfImageUrl.value.trim()) { pfPreview.src = pfImageUrl.value.trim(); pfPreview.style.display = 'block'; }
      });

      function nextSortOrder(category) {
        var max = 0;
        products.forEach(function (p) {
          if ((p.category || '') === category && (p.sortOrder || 0) > max) max = p.sortOrder;
        });
        return max + 1;
      }

      pfSave.addEventListener('click', function () {
        pformErr.textContent = '';
        var name = pfName.value.trim();
        var price = parseFloat(pfPrice.value);
        if (!name) { pformErr.textContent = 'Please enter a name · الرجاء إدخال الاسم'; return; }
        if (isNaN(price) || price < 0) { pformErr.textContent = 'Please enter a valid price · الرجاء إدخال سعر صحيح'; return; }

        var category, categoryTitle, categoryDisplay;
        if (pfCategory.value === '__new__') {
          categoryTitle = pfNewCatTitle.value.trim();
          if (!categoryTitle) { pformErr.textContent = 'Please enter the new category name · الرجاء إدخال اسم التصنيف الجديد'; return; }
          category = slugify(categoryTitle);
          categoryDisplay = pfNewCatDisplay.value === 'list' ? 'list' : 'card';
        } else {
          category = pfCategory.value;
          var meta = categoryMeta(category);
          categoryTitle = meta.title;
          categoryDisplay = meta.display;
        }

        pfSave.disabled = true;
        var origLabel = pfSave.textContent;
        pfSave.textContent = 'Saving… · جارٍ الحفظ…';

        function fail(msg) { pfSave.disabled = false; pfSave.textContent = origLabel; pformErr.textContent = msg; }

        function persist(imageUrl) {
          var id = pfId.value;
          var data = {
            name: name,
            price: price,
            category: category,
            categoryTitle: categoryTitle,
            categoryDisplay: categoryDisplay,
            desc: pfDesc.value.trim(),
            imageUrl: imageUrl || '',
            available: pfAvailable.checked,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          var op;
          if (id) {
            op = db.collection(PCOLL).doc(id).update(data);
          } else {
            data.sortOrder = nextSortOrder(category);
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            op = db.collection(PCOLL).add(data);
          }
          op.then(function () {
            pfSave.disabled = false;
            pfSave.textContent = origLabel;
            closeForm();
          }).catch(function (e) { fail('Could not save · تعذّر الحفظ: ' + e.message); });
        }

        if (pickedFile) {
          var ext = (pickedFile.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
          var path = 'product-images/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + ext;
          storage.ref().child(path).put(pickedFile).then(function (snap) {
            return snap.ref.getDownloadURL();
          }).then(function (url) {
            persist(url);
          }).catch(function (e) {
            fail('Image upload failed · فشل رفع الصورة: ' + e.message + '. Make sure Firebase Storage is enabled. · تأكد من تفعيل Firebase Storage.');
          });
        } else {
          persist(pfImageUrl.value.trim());
        }
      });

      productsList.addEventListener('click', function (e) {
        var b = e.target.closest('button');
        if (!b) return;
        var id = b.getAttribute('data-id');
        var act = b.getAttribute('data-pact');
        if (!id || !act) return;
        var prod = products.filter(function (p) { return p.id === id; })[0];
        if (!prod) return;

        if (act === 'edit') { openForm(prod); return; }
        if (act === 'toggle') {
          b.disabled = true;
          db.collection(PCOLL).doc(id).update({
            available: prod.available === false,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }).catch(function () { b.disabled = false; alert('Could not update · تعذّر التحديث'); });
          return;
        }
        if (act === 'delete') {
          if (!confirm('Delete "' + prod.name + '"? Past orders are NOT affected. · حذف "' + prod.name + '"؟ الطلبات السابقة لن تتأثر.')) return;
          b.disabled = true;
          db.collection(PCOLL).doc(id).delete().catch(function () { b.disabled = false; alert('Could not delete · تعذّر الحذف'); });
        }
      });

      seedBtn.addEventListener('click', function () {
        var defaults = window.MENU_PRODUCTS_DEFAULT || [];
        if (!defaults.length) { alert('No default products found · لا توجد منتجات افتراضية'); return; }
        if (products.length) {
          if (!confirm('You already have products. Import will ADD the menu items again (possible duplicates). Continue? · لديك منتجات بالفعل، الاستيراد سيضيف الأصناف مرة أخرى (قد تتكرر). متابعة؟')) return;
        } else {
          if (!confirm('Import the current menu into the database? · استيراد المنيو الحالي إلى قاعدة البيانات؟')) return;
        }
        seedBtn.disabled = true;
        var orig = seedBtn.textContent;
        seedBtn.textContent = 'Importing… · جارٍ الاستيراد…';
        var batch = db.batch();
        defaults.forEach(function (p) {
          var ref = db.collection(PCOLL).doc();
          var seedMeta = categoryMeta(p.category);
          batch.set(ref, {
            name: p.name, price: p.price, category: p.category,
            categoryTitle: p.categoryTitle || seedMeta.title,
            categoryDisplay: p.categoryDisplay || seedMeta.display,
            desc: p.desc || '',
            imageUrl: p.imageUrl || '', available: p.available !== false, sortOrder: p.sortOrder || 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        });
        batch.commit().then(function () {
          seedBtn.disabled = false;
          seedBtn.textContent = orig;
        }).catch(function (e) {
          seedBtn.disabled = false;
          seedBtn.textContent = orig;
          alert('Import failed · فشل الاستيراد: ' + e.message);
        });
      });

      function startProductsListening() {
        if (unsubProducts) return;
        unsubProducts = db.collection(PCOLL).onSnapshot(function (snap) {
          var next = [];
          snap.forEach(function (doc) { var d = doc.data(); d.id = doc.id; next.push(d); });
          products = next;
          renderProductsList();
        }, function (err) {
          productsList.innerHTML = '<div class="config-warn">Could not load products · تعذّر تحميل المنتجات.<br>' + esc(err.message) + '</div>';
        });
      }
      function stopProductsListening() { if (unsubProducts) { unsubProducts(); unsubProducts = null; } products = []; }

      /* ── AUTH ── */
      function doLogin() {
        loginErr.textContent = '';
        var email = emailEl.value.trim();
        var pass = passEl.value;
        if (!email || !pass) { loginErr.textContent = 'Enter email and password · أدخل البريد وكلمة المرور'; return; }
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in… · جارٍ الدخول…';
        auth.signInWithEmailAndPassword(email, pass).catch(function (err) {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In · تسجيل الدخول';
          loginErr.textContent = 'Login failed. Check your credentials. · فشل الدخول، تحقق من البيانات.';
        });
      }
      loginBtn.addEventListener('click', doLogin);
      passEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
      logoutBtn.addEventListener('click', function () { auth.signOut(); });

      auth.onAuthStateChanged(function (user) {
        if (user) {
          loginWrap.classList.add('hidden');
          dash.classList.remove('hidden');
          startListening();
          startProductsListening();
        } else {
          stopListening();
          stopProductsListening();
          dash.classList.add('hidden');
          loginWrap.classList.remove('hidden');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In · تسجيل الدخول';
          passEl.value = '';
        }
      });
    })();
  </script>
</body>
</html>
